<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>GakrBot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .user {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .assistant {
            color: #a3e635;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background: #1e293b;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #38bdf8;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="chat"></div>

<div id="input-area">
    <input type="text" id="messageInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
const API_URL = "https://YOUR-SPACE-NAME.hf.space/chat";

let chatHistory = "";

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value.trim();
    if (!message) return;

    const chatDiv = document.getElementById("chat");

    // show user message
    const userMsg = document.createElement("div");
    userMsg.className = "user";
    userMsg.textContent = "You: " + message;
    chatDiv.appendChild(userMsg);

    // assistant placeholder
    const assistantMsg = document.createElement("div");
    assistantMsg.className = "assistant";
    assistantMsg.textContent = "Assistant: ";
    chatDiv.appendChild(assistantMsg);

    chatDiv.scrollTop = chatDiv.scrollHeight;
    input.value = "";

    const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            system: "You are a helpful AI assistant.",
            history: chatHistory,
            message: message
        })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let assistantText = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        assistantText += chunk;

        assistantMsg.textContent = "Assistant: " + assistantText;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    chatHistory += `User: ${message}\nAssistant: ${assistantText}\n`;
}
</script>

</body>
</html>
